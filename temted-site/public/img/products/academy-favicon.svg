<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="capbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2B6A"/>
      <stop offset="100%" stop-color="#2D3F8A"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#capbg)"/>
  <!-- Graduation cap diamond (mortarboard top view) -->
  <rect x="-6" y="-6" width="12" height="12" rx="1.5" fill="white" opacity="0.95" transform="translate(16,13) rotate(45)"/>
  <!-- Inner highlight -->
  <rect x="-3.5" y="-3.5" width="7" height="7" rx="1" fill="white" opacity="0.35" transform="translate(16,13) rotate(45)"/>
  <!-- Brim ellipse (teal) -->
  <ellipse cx="16" cy="18" rx="11" ry="2.8" fill="#1CB8A0"/>
  <!-- Tassel cord (gold) -->
  <line x1="22" y1="7.5" x2="24.5" y2="11" stroke="#F5A623" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="24.5" y1="11" x2="24.5" y2="18.5" stroke="#F5A623" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Tassel threads -->
  <line x1="22.8" y1="18.5" x2="22.3" y2="23" stroke="#F5A623" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="24.5" y1="18.5" x2="24.5" y2="23.5" stroke="#F5A623" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="26.2" y1="18.5" x2="26.7" y2="22.5" stroke="#F5A623" stroke-width="1.1" stroke-linecap="round"/>
  <!-- Tassel knot -->
  <circle cx="24.5" cy="18.5" r="1.5" fill="#F5A623"/>
  <!-- Top button -->
  <circle cx="16" cy="11" r="1.5" fill="#F5A623"/>
</svg>
