<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 100" role="img" aria-label="OrthoLuma — Pediatric Orthotics">
  <defs>
    <linearGradient id="pill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B48EF2"/>
      <stop offset="100%" stop-color="#7C4FD4"/>
    </linearGradient>
  </defs>

  <!-- Spine + sensor mark centred at (60,50) -->
  <g transform="translate(60,50)">
    <rect x="-13" y="-46" width="26" height="14" rx="7" fill="url(#pill)"/>
    <rect x="-16" y="-27" width="32" height="14" rx="7" fill="url(#pill)"/>
    <rect x="-17" y="-8"  width="34" height="14" rx="7" fill="url(#pill)"/>
    <rect x="-16" y="11"  width="32" height="14" rx="7" fill="url(#pill)"/>
    <rect x="-13" y="30"  width="26" height="14" rx="7" fill="url(#pill)"/>
    <path d="M 22,-4  A 12 12 0 0 1 22,12" fill="none" stroke="#7C4FD4" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 29,-11 A 20 20 0 0 1 29,19" fill="none" stroke="#7C4FD4" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.5"/>
    <path d="M 36,-18 A 28 28 0 0 1 36,26" fill="none" stroke="#7C4FD4" stroke-width="1.2" stroke-linecap="round" stroke-opacity="0.25"/>
    <circle cx="22" cy="4" r="5" fill="#E8714A"/>
    <circle cx="22" cy="4" r="2.5" fill="white"/>
  </g>

  <!-- Wordmark -->
  <text x="108" y="45" font-size="28" font-weight="500" letter-spacing="-0.6" fill="#2D1760" font-family="-apple-system, 'Segoe UI', sans-serif">OrthoLuma</text>
  <text x="110" y="68" font-size="11" font-weight="400" letter-spacing="3" fill="#9B7CC8" font-family="-apple-system, 'Segoe UI', sans-serif">PEDIATRIC ORTHOTICS</text>
</svg>
