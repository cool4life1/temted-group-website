<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 110" role="img" aria-label="TemTed Academy — Professional Training">
  <defs>
    <linearGradient id="capgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2B6A"/>
      <stop offset="100%" stop-color="#2D3F8A"/>
    </linearGradient>
    <linearGradient id="brimgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1CB8A0"/>
      <stop offset="100%" stop-color="#0A8A7A"/>
    </linearGradient>
  </defs>

  <!-- Graduation cap mark centred at (62,55) -->
  <g transform="translate(62,55)">
    <!-- Cap board (diamond) -->
    <rect x="-34" y="-34" width="68" height="68" rx="7" fill="url(#capgrad)" transform="rotate(45 0 0)"/>
    <!-- Top surface highlight -->
    <rect x="-22" y="-22" width="44" height="44" rx="4" fill="#2D3F8A" opacity="0.6" transform="rotate(45 0 0)"/>
    <!-- Brim -->
    <ellipse cx="0" cy="10" rx="46" ry="10" fill="url(#brimgrad)"/>
    <!-- Tassel cord -->
    <line x1="34" y1="-34" x2="44" y2="-18" stroke="#F5A623" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="44" y1="-18" x2="44" y2="14"  stroke="#F5A623" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Tassel ends -->
    <line x1="40" y1="14" x2="40" y2="26" stroke="#F5A623" stroke-width="2" stroke-linecap="round"/>
    <line x1="44" y1="14" x2="44" y2="28" stroke="#F5A623" stroke-width="2" stroke-linecap="round"/>
    <line x1="48" y1="14" x2="48" y2="24" stroke="#F5A623" stroke-width="2" stroke-linecap="round"/>
    <!-- Tassel knot -->
    <circle cx="44" cy="14" r="4" fill="#F5A623"/>
    <!-- Top button -->
    <circle cx="0" cy="-8" r="4" fill="#F5A623"/>
  </g>

  <!-- Wordmark -->
  <text x="122" y="43" font-size="30" font-weight="500" letter-spacing="-0.6" fill="#0F1F2E" font-family="-apple-system, 'Segoe UI', sans-serif">TemTed</text>
  <text x="124" y="69" font-size="13" font-weight="500" letter-spacing="3" fill="#1CB8A0" font-family="-apple-system, 'Segoe UI', sans-serif">ACADEMY</text>
  <text x="124" y="88" font-size="10" font-weight="400" letter-spacing="1.5" fill="#8B9BAA" font-family="-apple-system, 'Segoe UI', sans-serif">Professional Training</text>
</svg>
